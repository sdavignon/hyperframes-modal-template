<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=1080,height=1920"><link rel="stylesheet" href="../shared/studio.css"><script src="../shared/studio.js"></script><style>.stage{width:1080px;height:1920px;padding:54px;display:grid;grid-template-rows:170px 720px 1fr;gap:34px}.headline{font-size:82px}.source{width:100%;height:720px;border-radius:42px}.row{display:grid;grid-template-columns:360px 1fr;gap:26px}.avatar{width:360px;height:520px;border-radius:34px}.panel{border-radius:34px;padding:34px}.script{font-size:36px;line-height:1.18}.small{font-size:24px}</style></head><body><main class="stage"><section><div class="badge">Viral Commentary</div><h1 class="headline" id="headline"></h1></section><video class="media source" id="source" autoplay muted loop playsinline></video><section class="row"><video class="avatar" id="avatar" autoplay muted loop playsinline></video><div class="panel"><p class="script" id="script"></p><p class="muted small" id="sourceDetails"></p><span class="cta" id="cta"></span></div></section></main><script>StudioComposition.loadManifest({copy:{headline:'A sharp take on the clip',script:'Use a licensed or source-approved clip capped at 10 seconds, then add your commentary script here.',sourceDetails:'Source details appear here.',cta:'Follow for context'}}).then(m=>{headline.textContent=m.copy?.headline;script.textContent=m.copy?.script;sourceDetails.textContent=m.copy?.sourceDetails;cta.textContent=m.copy?.cta;const a=StudioComposition.assetUrl(m,'avatar'); if(a) avatar.src=a; const s=StudioComposition.assetUrl(m,'source_clip'); if(s) source.src=s;});</script></body></html>
