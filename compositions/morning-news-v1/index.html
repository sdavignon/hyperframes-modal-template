<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=1920,height=1080"><link rel="stylesheet" href="../shared/studio.css"><script src="../shared/studio.js"></script><style>.stage{width:1920px;height:1080px;padding:72px;display:grid;grid-template-columns:1.1fr .9fr;gap:56px}.headline{font-size:106px}.script{font-size:34px;line-height:1.25}.avatar{width:100%;height:100%;border-radius:34px}.panel{border-radius:34px;padding:46px;align-self:end}</style></head><body><main class="stage"><section><div class="badge">Morning News</div><h1 class="headline" id="headline"></h1><div class="panel"><p class="script" id="script"></p><span class="cta" id="cta"></span></div></section><video class="avatar" id="avatar" autoplay muted loop playsinline></video></main><script>StudioComposition.loadManifest({copy:{headline:'Your morning brief, ready to render',script:'Add your script in Creator Studio. The immutable manifest will lock copy, timing, dimensions, template version, and asset IDs for reproducible renders.',cta:'Start the day informed'}}).then(m=>{headline.textContent=StudioComposition.text(m.copy?.headline);script.textContent=StudioComposition.text(m.copy?.script);cta.textContent=StudioComposition.text(m.copy?.cta);const src=StudioComposition.assetUrl(m,'avatar'); if(src) avatar.src=src;});</script></body></html>
