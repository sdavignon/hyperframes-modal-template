<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=1920,height=1080"><link rel="stylesheet" href="../shared/studio.css"><script src="../shared/studio.js"></script><style>.stage{width:1920px;height:1080px;padding:64px;display:grid;grid-template-columns:1fr 1fr;gap:46px;background:linear-gradient(135deg,#111827,#203047 55%,#0d1117)}.grid{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:22px}.photo{width:100%;height:100%;border-radius:30px}.headline{font-size:86px}.panel{border-radius:34px;padding:42px;display:flex;flex-direction:column;gap:24px}.copy{font-size:32px;line-height:1.22}</style></head><body><main class="stage"><section class="grid" id="photos"><div class="media photo"></div><div class="media photo"></div><div class="media photo"></div><div class="media photo"></div></section><section class="panel"><div class="badge">Complete Painting Services</div><h1 class="headline" id="headline"></h1><p class="copy" id="services"></p><p class="copy muted" id="proof"></p><span class="cta" id="cta"></span></section></main><script>StudioComposition.loadManifest({copy:{headline:'Fresh paint. Proven finish.',services:'Interior, exterior, trim, prep, repairs, and clean job sites.',proof:'Show actual-work photos and proof from recent projects.',cta:'Book an estimate'}}).then(m=>{headline.textContent=m.copy?.headline;services.textContent=m.copy?.services;proof.textContent=m.copy?.proof;cta.textContent=m.copy?.cta;const imgs=(m.assets||[]).filter(a=>a.key==='project_photos'); [...photos.children].forEach((el,i)=>{if(imgs[i]?.previewUrl||imgs[i]?.url){const im=document.createElement('img');im.className='media photo';im.src=imgs[i].previewUrl||imgs[i].url;el.replaceWith(im)}});});</script></body></html>
