<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HyperFrames on Modal</title>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@hyperframes/player@0.7.41"></script>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: #0e1016;
      color: #e8eaf0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 40px 24px;
    }
    h1 { margin: 0; font-size: 28px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
    h1 .modal-green { color: #80ee64; }
    h1 svg { height: 22px; width: auto; }
    .player-wrap { width: min(1120px, 100%); }
    hyperframes-player { display: block; width: 100%; aspect-ratio: 16 / 9; background: #000; border-radius: 12px; overflow: hidden; }
    button {
      appearance: none;
      border: 0;
      border-radius: 8px;
      background: #9ee937;
      color: #0e1016;
      font-size: 16px;
      font-weight: 600;
      padding: 12px 28px;
      cursor: pointer;
    }
    button:disabled { opacity: 0.5; cursor: default; }
    #status { min-height: 24px; font-size: 14px; color: #9aa1b2; }
    #result { width: min(1120px, 100%); display: none; }
    #result video { width: 100%; border-radius: 12px; }
    #result a { color: #9ee937; }
  </style>
</head>
<body>
  <h1>HyperFrames on <svg viewBox="0 66 300 168" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M121.683 75.25L149.997 124L91.4816 224.75C90.3128 226.757 88.155 228 85.8174 228H32.9664C31.7976 228 30.6778 227.691 29.697 227.131C28.7161 226.57 27.8906 225.758 27.3021 224.75L0.876625 179.25C-0.292208 177.243 -0.292208 174.765 0.876625 172.75L57.512 75.25C58.0923 74.2425 58.9259 73.43 59.9068 72.8694C60.8876 72.3088 62.0074 72 63.1762 72H116.027C118.365 72 120.523 73.2431 121.692 75.25H121.683ZM299.125 172.75L242.49 75.25C241.91 74.2425 241.076 73.43 240.095 72.8694C239.114 72.3088 237.995 72 236.826 72H183.975C181.637 72 179.479 73.2431 178.311 75.25L149.997 124L208.512 224.75C209.681 226.757 211.839 228 214.177 228H267.027C268.196 228 269.316 227.691 270.297 227.131C271.278 226.57 272.103 225.758 272.692 224.75L299.117 179.25C300.286 177.243 300.286 174.765 299.117 172.75H299.125Z" fill="#80EE64"/><path d="M149.997 124H89.5936L29.697 227.131C30.6778 227.691 31.7976 228 32.9664 228H85.8174C88.155 228 90.3128 226.757 91.4816 224.75L149.997 124Z" fill="#09AF58"/><path d="M299.125 179.25C299.706 178.243 300 177.121 300 176H240.61L210.915 227.131C211.896 227.691 213.016 228 214.185 228H267.036C269.373 228 271.531 226.757 272.7 224.75L299.125 179.25Z" fill="#09AF58"/></svg> <span class="modal-green">Modal</span></h1>

  <div class="player-wrap">
    <hyperframes-player src="/composition/" width="1920" height="1080" controls></hyperframes-player>
  </div>

  <button id="render">Render MP4</button>
  <p id="status"></p>

  <div id="result">
    <video controls></video>
    <p><a id="download" href="#" download>Download MP4</a></p>
  </div>

  <script>
    const btn = document.getElementById("render");
    const status = document.getElementById("status");
    const result = document.getElementById("result");

    async function poll(callId) {
      const res = await fetch(`/api/render/${callId}`);
      if (res.status === 202) return null;
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error || `render failed (${res.status})`);
      }
      return res.json();
    }

    btn.addEventListener("click", async () => {
      btn.disabled = true;
      result.style.display = "none";
      status.textContent = "Starting render…";
      const started = Date.now();
      try {
        const { call_id } = await (await fetch("/api/render", { method: "POST" })).json();
        status.textContent = "Rendering on Modal…";
        let done = null;
        while (!done) {
          await new Promise((r) => setTimeout(r, 2000));
          done = await poll(call_id);
          if (!done) {
            const secs = Math.round((Date.now() - started) / 1000);
            status.textContent = `Rendering on Modal… ${secs}s`;
          }
        }
        status.textContent = `Done in ${Math.round((Date.now() - started) / 1000)}s`;
        result.querySelector("video").src = done.url;
        document.getElementById("download").href = done.url;
        result.style.display = "block";
      } catch (err) {
        status.textContent = String(err.message || err);
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
